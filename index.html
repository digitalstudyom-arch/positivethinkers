<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Positiva - Reserva tu Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Lora', serif;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #D2691E 100%); /* Degradado marrón */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(139, 69, 19, 0.95); /* Marrón semitransparente */
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.8em;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }
        
        .subtitle {
            font-size: 1.3em;
            font-weight: 400;
            margin-bottom: 35px;
            opacity: 0.95;
            font-style: italic;
        }
        
        .descripcion {
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }
        
        #calendario {
            width: 100%;
            max-width: 350px;
            padding: 20px;
            margin-bottom: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Lora', serif;
            font-size: 1.2em;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        #calendario::placeholder {
            color: rgba(255,255,255,0.7);
        }
        
        #calendario:focus {
            outline: none;
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transform: scale(1.02);
        }
        
        .btn-whatsapp {
            display: inline-block;
            padding: 18px 45px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(37,211,102,0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-whatsapp:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(37,211,102,0.5);
        }
        
        .btn-whatsapp:active {
            transform: translateY(-2px);
        }
        
        .whatsapp-icon {
            font-size: 1.4em;
            margin-right: 12px;
        }
        
        #mensaje {
            margin-top: 25px;
            font-size: 1.1em;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        #mensaje.mostrar {
            opacity: 1;
        }
        
        footer {
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
            font-weight: 300;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 2.2em; }
            .container { padding: 30px 25px; margin: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mente Positiva</h1>
        <p class="subtitle">Terapia Práctica para Pensar Positivo</p>
        
        <p class="descripcion">
            Reserva tu primera sesión gratuita y comienza hoy mismo a transformar tu mentalidad con un enfoque práctico y positivo. 
            <br><strong>¡Un clic y cambias tu vida!</strong>
        </p>
        
        <input type="text" id="calendario" placeholder="Selecciona tu día ideal...">
        
        <a href="#" id="btn-whatsapp" class="btn-whatsapp">
            <span class="whatsapp-icon">📱</span>Confirmar Sesión
        </a>
        
        <div id="mensaje"></div>
    </div>
    
    <footer>
        © 2024 Mente Positiva | Tu transformación comienza aquí ✨
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        let fechaSeleccionada = '';
        
        // Calendario Flatpickr personalizado
        const fp = flatpickr("#calendario", {
            dateFormat: "d 'de' F 'de' Y",
            minDate: "today",
            dateFormat: "d/m/Y",
            locale: "es",
            minDate: new Date().fp_incr(1),
            maxDate: new Date().fp_incr(30),
            theme: "dark",
            onChange: function(selectedDates, dateStr, instance) {
                fechaSeleccionada = dateStr;
                
                const fechaFormato = new Date(fechaSeleccionada).toLocaleDateString('es-ES', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                
                document.getElementById('mensaje').innerHTML = `
                    ✅ <strong>¡Fecha perfecta seleccionada!</strong><br>
                    ${fechaFormato}<br>
                    <small>Haz clic en "Confirmar Sesión" para reservar por WhatsApp</small>
                `;
                document.getElementById('mensaje').classList.add('mostrar');
                
                // Actualizar botón WhatsApp
                actualizarWhatsapp(fechaFormato);
            },
            onReady: function() {
                document.getElementById('mensaje').innerHTML = 'Selecciona tu día ideal haciendo clic en el calendario ✨';
                document.getElementById('mensaje').classList.add('mostrar');
            }
        });
        
        function actualizarWhatsapp(fecha) {
            const mensaje = `¡Hola! Quiero reservar mi primera sesión GRATIS de Mente Positiva para el ${fecha} 😊\n\n¡Comienzo hoy mi transformación positiva! ✨`;
            document.getElementById('btn-whatsapp').href = `https://wa.me/541122523570?text=${encodeURIComponent(mensaje)}`;
        }
        
        // Inicializar botón
        actualizarWhatsapp('');
    </script>
</body>
</html>
